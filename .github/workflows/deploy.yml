name: Deploy to AWS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: smaatech-careers
  ECS_CLUSTER: cold-storage-prod-cluster
  ECS_SERVICE: careers

jobs:
  # ─── Job 1: Deploy Frontend to S3 ────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install dependencies
        run: npm install
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

      - name: Sync files to S3
        run: aws s3 sync ./frontend/dist s3://smaatechengineering.com-prod-288834682310 --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E3OLWZ1I7XXQH7 --paths "/*"

  # ─── Job 2: Build & Deploy Careers Backend to ECS ────────────────────────
  deploy-careers-backend:
    name: Deploy Careers Backend to ECS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        working-directory: ./careers
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition with new image
        id: task-def
        run: |
          CURRENT_TD=$(aws ecs describe-task-definition --task-definition smaatech-careers --query taskDefinition --output json)
          NEW_TD=$(echo "$CURRENT_TD" | python3 -c "
          import sys, json
          td = json.load(sys.stdin)
          for key in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          td['containerDefinitions'][0]['image'] = '${{ steps.build-image.outputs.image }}'
          print(json.dumps(td))
          ")
          NEW_TD_ARN=$(echo "$NEW_TD" | aws ecs register-task-definition --cli-input-json "$(cat /dev/stdin)" --query taskDefinition.taskDefinitionArn --output text <<< "$NEW_TD")
          echo "task-definition=$NEW_TD_ARN" >> $GITHUB_OUTPUT

      - name: Deploy updated task definition to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition ${{ steps.task-def.outputs.task-definition }} \
            --region $AWS_REGION
          echo "✅ ECS service updated with new task definition and image."
